name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ktlint · detekt · test · kover · dependency-guard
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      # Kotlin/Native toolchain, needed for KMP iOS compilation during quality checks.
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-v1-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-v1-
            ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Code style (ktlint)
        run: ./gradlew ktlintCheck

      # Each check below is independent (style, static analysis, tests, coverage, deps) —
      # !cancelled() lets a step still run after an earlier one fails, so a lint failure
      # doesn't hide whether tests/coverage/deps also broke (fail-complete signal).
      - name: Static analysis (detekt)
        if: ${{ !cancelled() }}
        run: ./gradlew detekt

      # noGms is the JVM unit-test target: the gms flavor pulls Google Play Services
      # maps, whose native libs SIGSEGV a shared Robolectric fork (exit 2). noGms
      # (MapLibre) has no Play Services native deps; map surfaces are faked in tests.
      - name: Unit tests
        if: ${{ !cancelled() }}
        run: ./scripts/run-jvm-tests.sh testNoGmsDebugUnitTest

      # KMP modules (feature:tracking, core:platform, core:security) name their JVM unit-test
      # task `testAndroidHostTest`, which the variant-specific aggregate above does not match.
      # This runs the commonMain engine/policy/mapper suites once on the host (both platforms
      # share the same code; iOS runs the same suite via iosSimulatorArm64Test).
      - name: KMP commonTest (host)
        if: ${{ !cancelled() }}
        run: ./gradlew testAndroidHostTest

      # Coverage measured + verified on the noGms variant (JVM-safe). The floor
      # (minBound 30% line) fails the build on regression, see app/build.gradle.kts.
      - name: Coverage report + floor
        if: ${{ !cancelled() }}
        run: ./gradlew :app:koverXmlReportNoGmsDebugCoverage :app:koverVerifyNoGmsDebugCoverage

      - name: Dependency guard
        if: ${{ !cancelled() }}
        run: ./gradlew dependencyGuard

      - name: Upload kover coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: kover-report
          path: app/build/reports/kover/reportNoGmsDebugCoverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
