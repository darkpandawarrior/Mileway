name: Deploy to Aptoide

# Uploads the Gms-flavor release APK via Aptoide Connect's Uploader API (single multipart POST, no
# community action needed). Gated on APTOIDE_API_KEY: no Aptoide Connect account/API key exists
# yet, so this job no-ops until configured.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_SECRET: ${{ secrets.APTOIDE_API_KEY != '' }}
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v7
        if: env.HAS_SECRET == 'true'

      - name: Set up JDK 21
        if: env.HAS_SECRET == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        if: env.HAS_SECRET == 'true'
        uses: gradle/actions/setup-gradle@v6

      - run: chmod +x ./gradlew
        if: env.HAS_SECRET == 'true'

      - name: Materialize signing secrets
        if: env.HAS_SECRET == 'true'
        run: |
          set -euo pipefail
          mkdir -p secrets
          if [ -n "${KEYSTORE_B64:-}" ]; then
            echo "$KEYSTORE_B64" | base64 -d > secrets/upload.keystore
            {
              echo "RELEASE_STORE_FILE=$PWD/secrets/upload.keystore"
              echo "RELEASE_STORE_PASSWORD=${KEYSTORE_PASSWORD:-}"
              echo "RELEASE_KEY_ALIAS=${KEY_ALIAS:-}"
              echo "RELEASE_KEY_PASSWORD=${KEY_PASSWORD:-}"
            } >> "$GITHUB_ENV"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release APK (Gms)
        if: env.HAS_SECRET == 'true'
        run: ./gradlew :app:assembleGmsRelease

      - name: Upload to Aptoide
        if: env.HAS_SECRET == 'true'
        run: |
          set -euo pipefail
          curl -sf -X POST "https://uploader.catappult.io/api" \
            -H "Api-Key: ${APTOIDE_API_KEY}" \
            -F "apk=@app/build/outputs/apk/gms/release/app-gms-release.apk"
        env:
          APTOIDE_API_KEY: ${{ secrets.APTOIDE_API_KEY }}
