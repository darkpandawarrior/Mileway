# github-release.yml — tag-triggered GitHub Release (changelog + debug/release artifacts).
# Template shipped by the versioned-release skill. Copy to .github/workflows/github-release.yml per repo.
# Distinct from release.yml (that one is STORE distribution via fastlane, manual, inert). This one
# creates the GitHub Release + attaches build artifacts on every `v*` tag push.
#
# Changelog source = commit messages between the previous tag and this one. Commit messages are
# guard-clean (the pre-commit no-reference-leak hook blocks reference terms), so the changelog is
# leak-safe by construction. If a RELEASE_SCRUBLIST_B64 secret is set, it's applied as a second layer.
name: GitHub Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }   # full history for the changelog range
      - name: Build changelog from commits since previous tag
        id: cl
        run: |
          set -euo pipefail
          cur="${GITHUB_REF_NAME}"
          prev="$(git describe --tags --abbrev=0 "${cur}^" 2>/dev/null || echo "")"
          range="${prev:+$prev..}$cur"
          git log --no-merges --pretty='- %s' "$range" > CHANGELOG_BODY.md
          # Second-layer scrub: only if the scrublist secret is configured (commits are already guard-clean).
          if [ -n "${RELEASE_SCRUBLIST_B64:-}" ]; then
            echo "$RELEASE_SCRUBLIST_B64" | base64 -d > /tmp/scrublist.txt
            pat="$(grep -vE '^\s*#|^\s*$' /tmp/scrublist.txt | paste -sd'|' -)"
            if [ -n "$pat" ] && grep -Eiq "$pat" CHANGELOG_BODY.md; then
              echo "::error::changelog matches a scrublist term — refusing to publish"; exit 1
            fi
          fi
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_SCRUBLIST_B64: ${{ secrets.RELEASE_SCRUBLIST_B64 }}
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin' }
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      # Both debug and release (noGms/F-Droid flavor). Release is unsigned unless a keystore secret is
      # materialized (F-Droid builds are unsigned + signed downstream) — fine for tracking/Obtainium.
      - name: Build artifacts
        run: |
          set -uo pipefail
          # Build command is repo-specific: set repo variable RELEASE_BUILD_CMD (Settings → Variables).
          # Mileway uses "assembleNoGmsDebug assembleNoGmsRelease"; a repo with no flavors uses
          # "assembleDebug assembleRelease". Falls back to debug-only if the full build fails (unsigned release).
          cmd="${RELEASE_BUILD_CMD:-assembleDebug assembleRelease}"
          ./gradlew $cmd || ./gradlew ${cmd%% *} || true
          mkdir -p dist
          find . -path '*/outputs/apk/*' -name '*.apk' -exec cp {} dist/ \; || true
        env:
          RELEASE_BUILD_CMD: ${{ vars.RELEASE_BUILD_CMD }}
      # Visual artifacts + golden diff vs previous release (screenshots/GIFs "tagged against release").
      - name: Visual artifacts + golden diff
        run: |
          set -uo pipefail
          prev="${{ steps.cl.outputs.prev }}"; cur="${GITHUB_REF_NAME}"
          shots="docs/screenshots"
          if [ -d "$shots" ]; then
            ( cd "$shots" && zip -q -r "$GITHUB_WORKSPACE/dist/screenshots.zip" . ) || true
            [ -d docs/demo ] && find docs/demo -name '*.gif' -exec cp {} dist/ \; || true
            { echo; echo "## Visual changes"; echo; } >> CHANGELOG_BODY.md
            if [ -n "$prev" ] && git rev-parse "$prev" >/dev/null 2>&1; then
              diff=$(git diff --name-status "$prev".."$cur" -- "$shots" || true)
              a=$(echo "$diff" | grep -c '^A' || true); m=$(echo "$diff" | grep -c '^M' || true); d=$(echo "$diff" | grep -c '^D' || true)
              echo "Since \`$prev\`: **$a new**, **$m changed**, **$d removed** screens." >> CHANGELOG_BODY.md
            else
              echo "First tracked visual baseline ($(find "$shots" -name '*.png' | wc -l | tr -d ' ') screens)." >> CHANGELOG_BODY.md
            fi
          fi
      - name: Create release
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file CHANGELOG_BODY.md dist/*
        env:
          GH_TOKEN: ${{ github.token }}
      # README chores are handled by the existing readme.yml (auto-refreshes fact-spans on main push,
      # commits as github-actions[bot]). A release tag doesn't push to main, so if a release should also
      # refresh README, dispatch it: `gh workflow run readme.yml` — kept separate so release ≠ README churn.
