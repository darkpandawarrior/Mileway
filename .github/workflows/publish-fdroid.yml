name: Publish F-Droid APK

# FLFD.5: builds the reproducible noGms (FOSS) release, signs it out-of-band with a pinned apksigner,
# and publishes the APK + .sha256 to a GitHub Release (the binary host referenced by the fdroiddata yml).
# All secrets are env-activated placeholders; the job is a no-op until they are configured.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0-fdroid)"
        required: true

permissions:
  contents: write

jobs:
  publish-fdroid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag }}
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build reproducible FOSS release (noGms, no minify)
        run: ./gradlew assembleNoGmsRelease -Pfdroid --no-build-cache

      - name: Decode the upload keystore
        run: echo "${KEYSTORE_B64}" | base64 -d > "${RUNNER_TEMP}/release.keystore"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

      - name: Sign the APK with a pinned apksigner
        run: |
          set -euo pipefail
          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)"
          UNSIGNED="$(find app/build/outputs/apk/noGms/release -name '*.apk' | head -1)"
          OUT="Mileway-${{ github.event.inputs.tag }}.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "${RUNNER_TEMP}/release.keystore" \
            --ks-pass "pass:${KEYSTORE_PASSWORD}" \
            --key-pass "pass:${KEY_PASSWORD}" \
            --ks-key-alias "${KEY_ALIAS}" \
            --out "$OUT" "$UNSIGNED"
          sha256sum "$OUT" > "$OUT.sha256"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Publish to GitHub Release
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          gh release create "$TAG" --generate-notes || true
          gh release upload "$TAG" \
            "Mileway-$TAG.apk" \
            "Mileway-$TAG.apk.sha256" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
