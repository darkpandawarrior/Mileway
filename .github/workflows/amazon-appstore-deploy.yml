name: Deploy to Amazon Appstore

# Uploads the Gms-flavor release APK via the App Submission API (community action). Gated on
# AMAZON_APPSTORE_CLIENT_ID: no security profile exists yet, so this job no-ops until one is
# created in Amazon's Developer Console (Apps & Services → API Access) and the app is already live
# on Amazon Appstore at least once (the API can only edit an existing listing, not create one).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_SECRET: ${{ secrets.AMAZON_APPSTORE_CLIENT_ID != '' }}
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
        if: env.HAS_SECRET == 'true'

      - name: Set up JDK 21
        if: env.HAS_SECRET == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        if: env.HAS_SECRET == 'true'
        uses: gradle/actions/setup-gradle@v6

      - run: chmod +x ./gradlew
        if: env.HAS_SECRET == 'true'

      - name: Materialize signing secrets
        if: env.HAS_SECRET == 'true'
        run: |
          set -euo pipefail
          mkdir -p secrets
          if [ -n "${KEYSTORE_B64:-}" ]; then
            echo "$KEYSTORE_B64" | base64 -d > secrets/upload.keystore
            {
              echo "RELEASE_STORE_FILE=$PWD/secrets/upload.keystore"
              echo "RELEASE_STORE_PASSWORD=${KEYSTORE_PASSWORD:-}"
              echo "RELEASE_KEY_ALIAS=${KEY_ALIAS:-}"
              echo "RELEASE_KEY_PASSWORD=${KEY_PASSWORD:-}"
            } >> "$GITHUB_ENV"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release APK (Gms)
        if: env.HAS_SECRET == 'true'
        run: ./gradlew :app:assembleGmsRelease

      - name: Upload to Amazon Appstore
        if: env.HAS_SECRET == 'true'
        uses: galonga/upload-amazon-appstore@v1.0.4
        with:
          clientId: ${{ secrets.AMAZON_APPSTORE_CLIENT_ID }}
          clientSecret: ${{ secrets.AMAZON_APPSTORE_CLIENT_SECRET }}
          appId: ${{ secrets.AMAZON_APPSTORE_APP_ID }}
          apkFile: app/build/outputs/apk/gms/release/app-gms-release.apk
