name: README auto-refresh

# Verifies the <!-- AUTOGEN:x --> fact spans in README.md are current — regenerated from
# settings.gradle.kts, the Room DB file, and docs/screenshots by scripts/gen-readme.sh.
#
# Why verify instead of auto-commit: main is protected by the "Quality Gate required" ruleset,
# so a bot's GITHUB_TOKEN can't push a refresh straight to main (the old push-to-main job failed
# on every main push). Instead this runs on the PR that changes a source file and fails if the
# fact spans drifted, so the author regenerates them in the same PR (where they *can* push):
#     ./scripts/gen-readme.sh && git add README.md && git commit
on:
  pull_request:
    branches: [ main ]
    paths:
      - 'settings.gradle.kts'
      - 'docs/screenshots/**'
      - 'core/data/**/MilewayDatabase.kt'
      - 'scripts/gen-readme.sh'
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: readme-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: README fact spans current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify README fact spans are current
        run: |
          chmod +x ./scripts/gen-readme.sh
          ./scripts/gen-readme.sh
          if ! git diff --exit-code -- README.md; then
            echo "::error::README fact spans are stale. Run ./scripts/gen-readme.sh and commit README.md in this PR."
            exit 1
          fi
          echo "README fact spans are current."
