name: iOS Build

# macOS runners are the most expensive GitHub-hosted minute rate, and this job compiles the
# whole Kotlin/Native iOS target — so it only runs when a change could plausibly affect the
# :shared iOS umbrella (KMP source, version catalog, or build scripts), not on every PR.

on:
  push:
    branches: [ main ]
    paths: &ios-paths
      - 'shared/**'
      - 'core/**'
      - 'feature/**'
      - 'contract/**'
      - 'stub/**'
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [ main ]
    paths: *ios-paths
  workflow_dispatch:   # manual run regardless of path filter

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    name: iOS Framework Build
    runs-on: macos-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-v1-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-v1-
            ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Compile the :shared iOS umbrella for both targets — this transitively compiles core:ui +
      # feature:tracking + every iosMain source the framework re-exports, so it's the meaningful "KMP code
      # is iOS-compatible" check. We deliberately do NOT link the debug framework: linking pulls Apple's
      # private _LocationEssentials framework (a CoreLocation dependency in the Kotlin/Native platform
      # bindings) that the runner's Xcode 16.4 *simulator* SDK no longer ships, so `ld` fails for reasons
      # unrelated to our code. Compiling validates every iosMain source; the framework binary is produced
      # by the Xcode build (:shared:linkDebugFrameworkIosSimulatorArm64), which needs a Mac + Xcode <= 16.2.
      - name: Compile shared Kotlin for iOS (device + simulator)
        run: ./gradlew :shared:compileKotlinIosArm64 :shared:compileKotlinIosSimulatorArm64
