name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      # Disable the daemon in CI, each run gets a fresh environment; daemon lifecycle
      # savings don't apply and it adds overhead from orphaned daemon processes.
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      # gradle/actions/setup-gradle manages ~/.gradle caching automatically with
      # intelligent eviction. Do NOT add a separate actions/cache for ~/.gradle.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # PRs only read the cache (never write) so they don't pollute the shared cache
          # with their own dependency resolutions; main branch pushes write.
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      # Kotlin/Native toolchain (~1 GB) lives outside ~/.gradle and must be cached separately.
      # Key on libs.versions.toml so it invalidates when the Kotlin or KMP version changes.
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-v1-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-v1-
            ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleGmsDebug

      # :server is a plain kotlin("jvm") Ktor module, not covered by the app/KMP unit-test
      # tasks that Quality Gate (quality.yml) already runs. Covers route behavior, opId
      # dedup, and PolicyRateEngine against in-memory H2.
      #
      # unit tests (testNoGmsDebugUnitTest), KMP commonTest (testAndroidHostTest), and
      # dependencyGuard are intentionally NOT run here — quality.yml's required "Quality
      # Gate" job already runs these exact tasks on the same push/PR triggers. Running them
      # twice across workflows doubles CI minutes for zero extra signal.
      - name: Run backend server tests
        if: ${{ !cancelled() }}
        run: ./gradlew :server:test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/build/reports/tests/'

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/gms/debug/

  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    # Cost gate: a minified/shrunk R8 release build is expensive and its only purpose is to
    # catch shrinker-only breakage before it reaches main. Running it on every PR duplicates
    # that cost per-push with no additional signal a PR-time debug build doesn't already give;
    # gate it to pushes on main (post-merge) so PRs stay fast.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # No signing secrets required: app/build.gradle.kts falls back to the debug key
      # when keystore.properties / RELEASE_* env vars are absent (B.1c), so the minified
      # + shrunk release variant still produces an installable APK in CI.
      - name: Assemble release APK
        run: ./gradlew assembleGmsRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/gms/release/

  # Screenshot baselines are handled by the self-maintaining `Screenshots` workflow
  # (.github/workflows/screenshots.yml): it records them in the CI environment and commits new/changed
  # ones back, instead of failing this pipeline on off-CI rendering drift.

  instrumented-tests:
    name: Instrumented Tests (GMD)
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      # Gradle Managed Devices boot an emulator, which needs hardware acceleration (KVM).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # GMD provisions an AOSP ATD (headless, no Google APIs → the noGms variant), runs the
      # tracking-lifecycle integration test (TrackingLifecycleTest), and tears the device down.
      #
      # Emulator boot on shared runners is intrinsically flaky (AvdSnapshotHandler can fail to create the
      # snapshot for GPU/KVM/timing reasons that vary run-to-run — the same code passes on a re-run). So we:
      #   1. force software GPU (headless runners have no display, so 'auto' can fail to start),
      #   2. retry up to 3x to ride out transient boot failures,
      #   3. continue-on-error so a bad-runner boot failure never reds the pipeline. The test still runs and
      #      its results upload below; it just doesn't gate on emulator infrastructure.
      - name: Run instrumented tests on Gradle Managed Device
        continue-on-error: true
        run: |
          gpu="-Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect"
          for attempt in 1 2 3; do
            echo "::group::GMD attempt $attempt"
            if ./gradlew pixel6Api34noGmsDebugAndroidTest "$gpu"; then
              echo "::endgroup::"; echo "GMD passed on attempt $attempt"; exit 0
            fi
            echo "::endgroup::"
            echo "::warning::GMD attempt $attempt failed (likely emulator boot); cleaning up and retrying"
            ./gradlew --stop || true
            sleep 15
          done
          echo "::warning::GMD failed to boot the emulator after 3 attempts — not gating (infra flakiness)"
          exit 1

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/'

  # iOS Kotlin/Native compile moved to .github/workflows/ios.yml (macOS runner, path-filtered)
  # so it doesn't run on every PR regardless of whether iOS-relevant sources changed.
