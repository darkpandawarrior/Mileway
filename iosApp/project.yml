name: iosApp
options:
  bundleIdPrefix: com.mileway
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  createIntermediateGroups: true

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ANALYZER_NONNULL: YES
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    COPY_PHASE_STRIP: NO
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    MTL_FAST_MATH: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_DYNAMIC_NO_PIC: NO
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS:
        - "DEBUG=1"
        - "$(inherited)"
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: NO
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: YES

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
  MilewayWatch:
    build:
      targets:
        MilewayWatch: all

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
        excludes:
          - Info.plist
          - "*.entitlements"
    settings:
      base:
        SDKROOT: iphoneos
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.mileway.ios
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: iosApp/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
      configs:
        Debug:
          FRAMEWORK_SEARCH_PATHS:
            - "$(inherited)"
            - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework"
        Release:
          FRAMEWORK_SEARCH_PATHS:
            - "$(inherited)"
            - "$(SRCROOT)/../shared/build/bin/iosSimulatorArm64/releaseFramework"
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          set -e
          cd "${SRCROOT}/.."
          if [ "${CONFIGURATION}" = "Release" ]; then
            ./gradlew :shared:linkReleaseFrameworkIosSimulatorArm64
          else
            ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
          fi
        basedOnDependencyAnalysis: false
    dependencies:
      - framework: ../shared/build/bin/iosSimulatorArm64/debugFramework/Mileway.framework
        embed: true
        codeSignOnCopy: true
        removeHeadersOnCopy: true
      - target: MilewayWatch
        embed: true
        codeSignOnCopy: true

  MilewayWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: MilewayWatch
        excludes:
          - Info.plist
    settings:
      base:
        SDKROOT: watchsimulator
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.mileway.ios.watchkitapp
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MilewayWatch/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"
        ARCHS: "arm64 arm64_32"
        WATCHOS_DEPLOYMENT_TARGET: "9.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        WKApplication: YES
        WKCompanionAppBundleIdentifier: com.mileway.ios
        WKRunsIndependentlyOfCompanionApp: YES
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../sharedWatch/build/bin/watchosCurrent/$(CONFIGURATION)Framework"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "MilewayWatch"
    preBuildScripts:
      - name: "Build KMP watch framework (lipo)"
        script: |
          set -e
          cd "${SRCROOT}/.."
          FLAVOR="${CONFIGURATION}Framework"
          DEST="sharedWatch/build/bin/watchosCurrent/${FLAVOR}"
          mkdir -p "$DEST"
          if [ "${PLATFORM_NAME}" = "watchsimulator" ]; then
            ./gradlew ":sharedWatch:link${CONFIGURATION}FrameworkWatchosSimulatorArm64"
            rm -rf "$DEST/MilewayWatch.framework"
            cp -R "sharedWatch/build/bin/watchosSimulatorArm64/${FLAVOR}/MilewayWatch.framework" "$DEST/MilewayWatch.framework"
          else
            ./gradlew ":sharedWatch:link${CONFIGURATION}FrameworkWatchosArm64" ":sharedWatch:link${CONFIGURATION}FrameworkWatchosDeviceArm64"
            rm -rf "$DEST/MilewayWatch.framework"
            cp -R "sharedWatch/build/bin/watchosArm64/${FLAVOR}/MilewayWatch.framework" "$DEST/MilewayWatch.framework"
            lipo -create \
              "sharedWatch/build/bin/watchosArm64/${FLAVOR}/MilewayWatch.framework/MilewayWatch" \
              "sharedWatch/build/bin/watchosDeviceArm64/${FLAVOR}/MilewayWatch.framework/MilewayWatch" \
              -output "$DEST/MilewayWatch.framework/MilewayWatch"
          fi
        basedOnDependencyAnalysis: false
