# Compose Compiler Stability Configuration
# Tells the compiler these third-party types are effectively immutable.
# Without this, the compiler marks params of these types as "unstable" →
# the composable can't be skipped even when its inputs haven't changed.
#
# How to find what to add here:
#   ./gradlew assembleGmsRelease -PenableComposeMetrics=true
#   open app/build/compose_metrics/<module>-classes.txt
#   look for "unstable" classes that you can't modify (third-party)
#   add them here; rerun — they should become "stable"

# kotlinx.datetime — value types; no mutable state
kotlinx.datetime.Instant
kotlinx.datetime.LocalDate
kotlinx.datetime.LocalDateTime
kotlinx.datetime.LocalTime
kotlinx.datetime.TimeZone

# Kotlin standard library types often inferred as unstable due to type parameters
kotlin.Pair
kotlin.Triple
